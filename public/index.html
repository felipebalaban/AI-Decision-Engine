<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Decision Engine</title>
    <style>
        :root { --bg:#fff8ef; --ink:#1f1f1f; --panel:#fff; --accent:#ff8a5b; --accent-2:#ffd166; --accent-3:#7bd389; --accent-4:#6c8cff; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; background:linear-gradient(135deg,var(--bg),#ffe3d6); color:var(--ink); font-family:Georgia,serif; }
        main { width:min(760px,92vw); padding:28px; background:rgba(255,255,255,.92); border:1px solid #f1cbb6; border-radius:24px; box-shadow:0 22px 60px rgba(178,91,45,.12); }
        textarea, button, pre { width:100%; }
        textarea, pre { border:1px solid #efc5af; border-radius:16px; padding:14px; background:#fffdf9; }
        button { margin-top:16px; border:0; border-radius:999px; padding:14px 18px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#2a1308; font-weight:700; cursor:pointer; }
        #status { min-height:24px; color:#8a4b2b; font-weight:700; }
        .summary { display:grid; gap:12px; }
        .metric { display:grid; gap:6px; }
        .metric strong { font-size:.95rem; letter-spacing:.02em; }
        .bar { min-height:52px; display:flex; align-items:center; padding:12px 14px; border-radius:16px; color:#1e1e1e; font-weight:700; }
        .categoria .bar { background:linear-gradient(90deg,var(--accent),#ffb38a); }
        .prioridade .bar { background:linear-gradient(90deg,var(--accent-2),#ffe7a1); }
        .canal .bar { background:linear-gradient(90deg,var(--accent-3),#b9f0cb); }
        .tom .bar { background:linear-gradient(90deg,var(--accent-4),#c6d2ff); }
        .confianca .bar { background:linear-gradient(90deg,#c77dff,#f2b3ff); }
        .justificativa .bar { background:linear-gradient(90deg,#ff99ac,#ffd6de); }
    </style>
</head>
<body>
    <main>
        <h1>AI Decision Engine</h1>
        <p>Type a message below and see how the backend responds.</p>

        <label for="texto">User input</label>
        <textarea 
            id="texto" 
            rows="6" 
            cols="50" 
            placeholder="Example: My internet has been down for two days and support is not helping.">
        </textarea>

        <button id="analyzeBtn">Analyze</button>
        <p id="status"></p>

        <h2>Decision Summary</h2>
        <section class="summary">
            <div class="metric categoria"><strong>Categoria</strong><div class="bar"><span id="categoria">-</span></div></div>
            <div class="metric prioridade"><strong>Prioridade</strong><div class="bar"><span id="prioridade">-</span></div></div>
            <div class="metric canal"><strong>Canal recomendado</strong><div class="bar"><span id="canal">-</span></div></div>
            <div class="metric tom"><strong>Tom</strong><div class="bar"><span id="tom">-</span></div></div>
            <div class="metric confianca"><strong>Confianca</strong><div class="bar"><span id="confianca">-</span></div></div>
            <div class="metric justificativa"><strong>Justificativa</strong><div class="bar"><span id="justificativa">-</span></div></div>
        </section>

        <h2>Raw Response</h2>
        <pre id="result">No response yet.</pre>
    </main>

    <script src="./script.js"></script>
</body>
</html>
